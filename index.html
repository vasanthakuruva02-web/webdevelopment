<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

/* NAVBAR */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#0077b6;
    color:white;
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
}

/* heading */
h1{
    text-align:center;
    color:#0f61a4;
}

/* flex container */
.flex-container{
    display:flex;
    padding:20px;
    flex-wrap:wrap;
    justify-content:center;
}

/* product card */
.flex-item{
    background-color:rgb(218, 182, 182);
    padding:15px;
    height:330px;
    width:240px;
    text-align:center;
    border-radius:20px;
    margin:10px;
    border:1px solid #762323;
    transition:0.3s;
}

.flex-item:hover{
    transform:scale(1.05);
    box-shadow:0 4px 10px rgba(184, 61, 61, 0.2);
}

.flex-item img{
    width:100%;
    height:150px;
    border-radius:10px;
    object-fit:cover;
}

/* price */
.price{
    color:#4933f0;
    font-weight:bold;
}

/* button */
button{
    background-color:#035280;
    border-radius:20px;
    cursor:pointer;
    padding:8px 10px;
    border:none;
    margin-top:8px;
    color:white;
}

button:hover{
    background-color:rgb(105, 19, 19);
}
</style>
</head>

<body>

<header>
  <h2>MySite</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<h1>BBLUNT Hair Care Products</h1>

<div class="flex-container">

<div class="flex-item">
<img src="https://bblunt.com/cdn/shop/files/hair-fall-shampoo_69341926-cb62-4e2d-8239-0fce759cf547.jpg?v=1734415120&width=600">
<h3>Shampoo</h3>
<p class="price">₹450</p>
<button>Buy Now</button>
</div>

<div class="flex-item">
<img src="https://bblunt.com/cdn/shop/files/hair-fall-control-conditioner_1_7efe3157-53d3-425c-acbc-b08538a148bd.jpg?v=1734417948&width=600">
<h3>Conditioner</h3>
<p class="price">₹399</p>
<button>Buy Now</button>
</div>

<div class="flex-item">
<img src="https://bblunt.com/cdn/shop/files/1_b718531f-314d-4a18-8340-b9a961493e78.jpg?v=1746517527&width=600">
<h3>Hair Serum</h3>
<p class="price">₹550</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
